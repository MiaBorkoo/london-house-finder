name: London House Finder

on:
  schedule:
    # Scrape every 30 minutes during daytime UK hours (8am-10pm)
    - cron: '*/30 8-22 * * *'
    # Daily digest at 8am UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Download previous database
        uses: dawidd6/action-download-artifact@v3
        with:
          name: properties-db
          path: data/
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run scraper
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CONFIG_SHEET_ID: ${{ secrets.CONFIG_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py run

      - name: Send daily digest
        if: github.event.schedule == '0 8 * * *'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CONFIG_SHEET_ID: ${{ secrets.CONFIG_SHEET_ID }}
        run: python main.py digest

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: properties-db
          path: data/properties.db
          retention-days: 90
